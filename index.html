<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dinner Invite</title>
  <link rel="stylesheet" href="./style.css"/>
</head>

<body class="page1">
  <main class="card">
    <h1>Assalam o Alaikum! Are you free on Saturday for dinner?</h1>
    <p class="sub">🌸❤️ Just a tiny question... with a big smile 🙂</p>

    <div class="invite-box">
      <button class="btn primary" id="yesBtn">Yes</button>
      <button class="btn no-btn" id="noBtn">No</button>
    </div>

    <div class="result" id="result"></div>
    <div class="hint">I know you are busy with your stuff and commitments, but I would love to take you out for dinner 🙂</div>
  </main>

  <!-- Flower popup -->
  <div class="flower-popup" id="flowerPopup">
    <div class="flower-card">
      <div class="big-flower">🌹</div>
      <h2>It’s for you</h2>
      <p>Now let’s pick something nice for dinner 💕</p>
    </div>
  </div>

  <script src="./app.js"></script>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const box = noBtn.parentElement;
    const result = document.getElementById("result");
    const flowerPopup = document.getElementById("flowerPopup");

    function moveNo(){
      const boxRect = box.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const padding = 12;
      const minX = padding;
      const maxX = boxRect.width - btnRect.width - padding;

      const currentLeft = parseFloat(getComputedStyle(noBtn).left) || (boxRect.width * 0.60);
      const delta = (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 90);

      let nextLeft = Math.max(minX, Math.min(maxX, currentLeft + delta));
      const nextTop = (boxRect.height / 2) + (Math.random() * 18 - 9);

      noBtn.style.left = nextLeft + "px";
      noBtn.style.top = nextTop + "px";
    }

    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("mousedown", (e) => {
      e.preventDefault();
      moveNo();
    });
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNo();
    }, { passive:false });
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNo();
    });

    window.addEventListener("load", () => {
      const rect = box.getBoundingClientRect();
      noBtn.style.left = (rect.width * 0.62) + "px";
      noBtn.style.top = (rect.height / 2) + "px";
      clearData();
    });

    yesBtn.addEventListener("click", () => {
      saveData({ accepted: "Yes" });

      flowerPopup.classList.add("show");

      setTimeout(() => {
        window.location.href = "food.html";
      }, 2200);
    });
  </script>
</body>
</html>
